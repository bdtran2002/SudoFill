name: Release

on:
  push:
    tags:
      - 'sudofill-v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Validate release source
        run: |
          set -euo pipefail
          git fetch origin main --depth=1

          origin_main_sha="$(git rev-parse origin/main)"
          current_sha="${GITHUB_SHA}"

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            if [ "${current_sha}" != "${origin_main_sha}" ]; then
              echo "Release tags must be created from the current origin/main HEAD."
              echo "Tagged commit: ${current_sha}"
              echo "origin/main HEAD: ${origin_main_sha}"
              exit 1
            fi
          elif [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            if [ "${GITHUB_REF_NAME}" != "main" ]; then
              echo "Manual release runs must be dispatched from the main branch."
              echo "Current ref: ${GITHUB_REF_NAME}"
              exit 1
            fi

            if [ "${current_sha}" != "${origin_main_sha}" ]; then
              echo "Manual release runs must use the current origin/main HEAD."
              echo "Workflow SHA: ${current_sha}"
              echo "origin/main HEAD: ${origin_main_sha}"
              exit 1
            fi
          else
            echo "Unsupported release trigger: ${GITHUB_EVENT_NAME}."
            exit 1
          fi

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun ci

      - name: Verify release version metadata
        run: bun run release:check

      - name: Run lint
        run: bun run lint

      - name: Check formatting
        run: bun run format:check

      - name: Run typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Check Firefox bundle freshness
        run: bun run firefox-addon:check

      - name: Build Chrome bundle
        run: bun run build:chrome

      - name: Package Firefox bundle
        run: bun run zip:firefox

      - name: Package Chrome bundle
        run: bun run zip:chrome

      - name: Verify generated manifest versions
        run: bun run release:check:artifacts

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-artifacts
          include-hidden-files: true
          path: |
            .output/*.zip
            .output/**/*.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: |
            .output/*.zip
            .output/**/*.zip
