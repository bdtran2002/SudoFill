<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Burner Email Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0e0f11;
    --surface:  #16181c;
    --panel:    #1c1f24;
    --border:   #2a2d34;
    --border2:  #363a43;
    --text:     #e8eaf0;
    --muted:    #7a7f8e;
    --dim:      #454a57;
    --accent:   #4fffb0;
    --accent2:  #00d97e;
    --danger:   #ff5f6d;
    --warn:     #f5a623;
    --mono:     'IBM Plex Mono', monospace;
    --sans:     'DM Sans', sans-serif;
  }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    width: 380px;
    min-height: 520px;
    overflow-x: hidden;
    font-size: 13px;
    line-height: 1.5;
  }

  /* scanline texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 999;
  }

  .header {
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-icon {
    width: 28px;
    height: 28px;
    background: var(--accent);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .logo-icon svg { display: block; }

  .logo-text {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .logo-sub {
    font-size: 10px;
    color: var(--muted);
    font-family: var(--mono);
    letter-spacing: 0.05em;
  }

  .count-badge {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--accent);
    background: rgba(79,255,176,0.1);
    border: 1px solid rgba(79,255,176,0.2);
    border-radius: 999px;
    padding: 2px 8px;
  }

  .controls {
    padding: 14px 18px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .ctrl-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .ctrl-label {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    width: 58px;
    flex-shrink: 0;
    font-family: var(--mono);
  }

  .chip-group {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }

  .chip {
    font-family: var(--mono);
    font-size: 10px;
    padding: 3px 9px;
    border-radius: 4px;
    border: 1px solid var(--border2);
    color: var(--muted);
    background: var(--panel);
    cursor: pointer;
    transition: all 0.12s;
    user-select: none;
  }

  .chip:hover { border-color: var(--dim); color: var(--text); }

  .chip.active {
    background: rgba(79,255,176,0.12);
    border-color: rgba(79,255,176,0.4);
    color: var(--accent);
  }

  select.ctrl-select {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 4px 8px;
    border-radius: 5px;
    cursor: pointer;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
  }

  select.ctrl-select:focus { border-color: var(--dim); }

  .gen-btn {
    margin: 0 18px;
    width: calc(100% - 36px);
    padding: 9px;
    background: var(--accent);
    color: #0a1a12;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 500;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.15s, transform 0.1s;
    margin-top: 14px;
    margin-bottom: 14px;
  }

  .gen-btn:hover { background: #6fffbc; }
  .gen-btn:active { transform: scale(0.98); }
  .gen-btn:disabled { background: var(--dim); color: var(--muted); cursor: not-allowed; }

  .results-area {
    padding: 0 18px 18px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .result-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 10px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    animation: slideIn 0.18s ease;
    transition: border-color 0.15s;
  }

  .result-card:hover { border-color: var(--border2); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .email-display {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
    word-break: break-all;
    line-height: 1.4;
    flex: 1;
  }

  .email-local { color: var(--text); }
  .email-at    { color: var(--dim); }
  .email-domain{ color: var(--muted); }

  .card-actions {
    display: flex;
    gap: 5px;
    flex-shrink: 0;
  }

  .icon-btn {
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 5px;
    cursor: pointer;
    transition: all 0.12s;
    color: var(--muted);
  }

  .icon-btn:hover { border-color: var(--border2); color: var(--text); background: var(--border); }
  .icon-btn.copied { border-color: rgba(79,255,176,0.4); color: var(--accent); background: rgba(79,255,176,0.08); }

  .empty-state {
    padding: 28px 18px;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 11px;
    line-height: 2;
  }

  .empty-state .big { font-size: 22px; display: block; margin-bottom: 8px; opacity: 0.4; }

  .divider-label {
    padding: 4px 18px;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--dim);
    font-family: var(--mono);
  }

  .copy-all-row {
    padding: 0 18px 10px;
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }

  .text-btn {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.12s;
  }

  .text-btn:hover { color: var(--text); border-color: var(--border2); }

  /* scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
</style>
</head>

<script>
// ─── WORDLISTS ────────────────────────────────────────────────────────────────

    "lyra","meld","neon","onyx","prism","qubit","rune","sift","tron","umbra",
    "volt","warp","xeno","yore","zeal","aeon","blaze","comet","drip","ethos"
  ],

// ─── UTILITIES ────────────────────────────────────────────────────────────────

const pick = arr => arr[Math.floor(Math.random() * arr.length)];
const pickN = (arr, n) => {
  const s = [...arr].sort(() => Math.random() - 0.5);
  return s.slice(0, n);
};

// weighted random: pass [[item, weight], ...]
function wpick(pairs) {
  const total = pairs.reduce((s,[,w])=>s+w, 0);
  let r = Math.random() * total;
  for (const [item, w] of pairs) { r -= w; if (r <= 0) return item; }
  return pairs[0][0];
}

// optional numeric suffix (weighted toward no number)
function maybeSuffix() {
  const roll = Math.random();
  if (roll < 0.45) return "";
  if (roll < 0.70) return String(Math.floor(Math.random()*99)+1);
  if (roll < 0.85) return String(Math.floor(Math.random()*999)+1);
  const years = [85,86,87,88,89,90,91,92,93,94,95,96,97,98,99,00,01,02,03,04,05];
  return String(pick(years)).padStart(2,"0");
}

// separator picker
function sep(choices) {
  return pick(choices);
}

// ─── LOCAL PART GENERATORS ────────────────────────────────────────────────────

const PATTERNS = {

  "name.name": () => {
    const s = sep([".", "-", "_", ""]);
    const a = pick(W.firstNames);
    const b = pick(W.lastNames);
    return a + s + b + maybeSuffix();
  },

  "adj.noun": () => {
    const s = sep([".", "-", "_"]);
    const a = pick(W.adjectives);
    const b = pick(W.nouns);
    return a + s + b + maybeSuffix();
  },

  "verb.noun": () => {
    const s = sep([".", "-", "_"]);
    const a = pick(W.verbs);
    const b = pick(W.nouns);
    return a + s + b + maybeSuffix();
  },

  "name+num": () => {
    const base = pick(Math.random() < 0.5 ? W.firstNames : W.lastNames);
    const n = Math.random() < 0.5
      ? String(Math.floor(Math.random()*99)+1)
      : String(Math.floor(Math.random()*9999)+100);
    return base + n;
  },

  "word_word": () => {
    const all = [...W.adjectives, ...W.nouns, ...W.verbs];
    const s = sep(["_", ".", "-"]);
    const a = pick(all);
    let b = pick(all);
    while (b === a) b = pick(all);
    return a + s + b + maybeSuffix();
  },

  // multi-word combos
  "name.adj.noun": () => {
    const s = sep([".", "-", "_"]);
    return pick(W.firstNames) + s + pick(W.adjectives) + s + pick(W.nouns);
  },

  "adj.name": () => {
    const s = sep([".", "-", "_", ""]);
    return pick(W.adjectives) + s + pick(W.firstNames) + maybeSuffix();
  },

  "initials.lastname": () => {
    const fn = pick(W.firstNames);
    const ln = pick(W.lastNames);
    const mi = Math.random() < 0.4 ? pick(W.firstNames)[0] : "";
    const s  = sep([".", "_", ""]);
    return fn[0] + mi + s + ln + maybeSuffix();
  },

  "firstname.initial": () => {
    const fn = pick(W.firstNames);
    const ln = pick(W.lastNames);
    return fn + sep([".", "_", "-"]) + ln[0] + maybeSuffix();
  }
};

const ANY_PATTERNS = [
  ["name.name",       3],
  ["adj.noun",        2],
  ["verb.noun",       2],
  ["name+num",        2],
  ["word_word",       1.5],
  ["name.adj.noun",   0.8],
  ["adj.name",        1.2],
  ["initials.lastname",1.5],
  ["firstname.initial",1.2],
];

function generateLocal(pattern) {
  if (pattern === "any") {
    const chosen = wpick(ANY_PATTERNS);
    return PATTERNS[chosen]();
  }
  return (PATTERNS[pattern] || PATTERNS["name.name"])();
}

// ─── DOMAIN GENERATOR ────────────────────────────────────────────────────────

function generateDomain(style) {
  if (style === "realistic") return pick(W.realDomains);
  if (style === "invented") {
    const word = pick(W.domainWords);
    const tld  = pick(W.tlds);
    return word + tld;
  }
  // mixed
  return Math.random() < 0.55 ? pick(W.realDomains)
    : pick(W.domainWords) + pick(W.tlds);
}

// ─── DUPLICATE GUARD ─────────────────────────────────────────────────────────

function generateEmails(count, pattern, domainStyle) {
  const seen = new Set();
  const emails = [];
  let attempts = 0;
  while (emails.length < count && attempts < count * 30) {
    attempts++;
    const local  = generateLocal(pattern);
    const domain = generateDomain(domainStyle);
    const email  = local + "@" + domain;
    if (!seen.has(email)) { seen.add(email); emails.push(email); }
  }
  return emails;
}

// ─── STATE ────────────────────────────────────────────────────────────────────

let selectedCount   = 1;
let selectedPattern = "any";
let totalGenerated  = 0;

// ─── UI WIRING ────────────────────────────────────────────────────────────────

function initChips(groupId, onSelect) {
  const group = document.getElementById(groupId);
  group.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      group.querySelectorAll(".chip").forEach(c => c.classList.remove("active"));
      chip.classList.add("active");
      onSelect(chip.dataset.v);
    });
  });
}

initChips("count-chips",   v => { selectedCount   = parseInt(v); });
initChips("pattern-chips", v => { selectedPattern  = v; });

// ─── RENDER RESULTS ───────────────────────────────────────────────────────────

function renderResults(emails) {
  const wrapper = document.getElementById("results-wrapper");
  document.getElementById("empty-state")?.remove();

  // remove previous run marker + copy-all if present
  wrapper.querySelectorAll(".run-block").forEach(el => el.remove());

  const block = document.createElement("div");
  block.className = "run-block";

  if (emails.length > 1) {
    const topRow = document.createElement("div");
    topRow.className = "copy-all-row";
    topRow.innerHTML = `
      <button class="text-btn" id="copy-all-btn">copy all</button>
      <button class="text-btn" id="clear-btn">clear</button>
    `;
    block.appendChild(topRow);
    topRow.querySelector("#copy-all-btn").addEventListener("click", () => {
      const text = emails.join("\n");
      navigator.clipboard.writeText(text).then(() => {
        const btn = topRow.querySelector("#copy-all-btn");
        btn.textContent = "copied!";
        setTimeout(() => btn.textContent = "copy all", 1600);
      });
    });
    topRow.querySelector("#clear-btn").addEventListener("click", () => {
      block.remove();
      document.getElementById("results-wrapper").innerHTML =
        `<div class="empty-state" id="empty-state"><span class="big">✉</span>press generate to create<br>realistic burner addresses</div>`;
    });
  }

  const area = document.createElement("div");
  area.className = "results-area";

  emails.forEach((email, i) => {
    const [local, domain] = email.split("@");
    const card = document.createElement("div");
    card.className = "result-card";
    card.style.animationDelay = `${i * 35}ms`;
    card.innerHTML = `
      <div class="email-display">
        <span class="email-local">${local}</span><span class="email-at">@</span><span class="email-domain">${domain}</span>
      </div>
      <div class="card-actions">
        <button class="icon-btn copy-btn" title="Copy" data-email="${email}">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <rect x="1" y="4" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M4 4V2.5A1.5 1.5 0 0 1 5.5 1H11.5A1.5 1.5 0 0 1 13 2.5V8.5A1.5 1.5 0 0 1 11.5 10H10" stroke="currentColor" stroke-width="1.3"/>
          </svg>
        </button>
        <button class="icon-btn regen-btn" title="Regenerate this one" data-index="${i}">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <path d="M11.5 3A5.5 5.5 0 1 0 12.5 7.5" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            <path d="M9 1l3 2-2 3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    `;

    card.querySelector(".copy-btn").addEventListener("click", function() {
      navigator.clipboard.writeText(this.dataset.email).then(() => {
        this.classList.add("copied");
        this.innerHTML = `<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><path d="M2 7l4 4 6-6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
        setTimeout(() => {
          this.classList.remove("copied");
          this.innerHTML = `<svg width="13" height="13" viewBox="0 0 14 14" fill="none"><rect x="1" y="4" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/><path d="M4 4V2.5A1.5 1.5 0 0 1 5.5 1H11.5A1.5 1.5 0 0 1 13 2.5V8.5A1.5 1.5 0 0 1 11.5 10H10" stroke="currentColor" stroke-width="1.3"/></svg>`;
        }, 1600);
      });
    });

    card.querySelector(".regen-btn").addEventListener("click", function() {
      const domainStyle = document.getElementById("domain-select").value;
      const [newEmail] = generateEmails(1, selectedPattern, domainStyle);
      const [nl, nd] = newEmail.split("@");
      card.querySelector(".email-display").innerHTML =
        `<span class="email-local">${nl}</span><span class="email-at">@</span><span class="email-domain">${nd}</span>`;
      card.querySelector(".copy-btn").dataset.email = newEmail;
      card.style.animation = "none";
      void card.offsetWidth;
      card.style.animation = "slideIn 0.15s ease";
    });

    area.appendChild(card);
  });

  block.appendChild(area);
  wrapper.appendChild(block);
}

// ─── GENERATE BUTTON ─────────────────────────────────────────────────────────

document.getElementById("gen-btn").addEventListener("click", () => {
  const domainStyle = document.getElementById("domain-select").value;
  const emails = generateEmails(selectedCount, selectedPattern, domainStyle);
  renderResults(emails);
  totalGenerated += emails.length;
  document.getElementById("history-count").textContent = `${totalGenerated} generated`;
});
</script>
</body>
</html>
