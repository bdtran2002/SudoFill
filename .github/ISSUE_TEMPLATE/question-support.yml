name: ❓ Question or Support Request
description: Questions and requests for support
title: '[question/support] <title>'
labels: ['question ❓', 'status: needs triage']
assignees:
  - bhdicaire
body:
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: Please search to see if an issue already exists for your question or support request.
      options:
        - label: I have searched the existing issues
          required: true
  - type: textarea
    attributes:
      label: Describe your question or support request
      description: A concise description of what you would like help with.
    validations:
      required: true
